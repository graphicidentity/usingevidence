name: Build and Deploy Eleventy to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set PATH_PREFIX
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "PATH_PREFIX=/" >> $GITHUB_ENV
          else
            echo "PATH_PREFIX=/${REPO_NAME}/" >> $GITHUB_ENV
          fi

      - run: npm install
      - run: npx eleventy --version
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
